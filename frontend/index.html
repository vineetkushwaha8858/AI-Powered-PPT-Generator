 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fast Presentation Generator</title>
<style>
body { font-family: Arial, sans-serif; max-width: 820px; margin: 20px auto; padding: 20px; background: #f0f4fb;}
.container { background: white; padding: 30px 32px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);}
h1 { text-align: center; color: #1a1b2f; margin-bottom: 24px;}
label { font-weight: bold; display: block; margin-bottom: 8px; }
input[type=text], input[type=number], select { width: 100%; font-size: 16px; padding: 8px; border-radius: 8px; border: 1px solid #aaa; margin-bottom: 16px;}
#template-style-grid { display: grid; grid-template-columns: repeat(3,1fr); gap:16px 16px; margin-top:10px;}
.style-tile {
  min-height: 110px;
  border-radius: 14px;
  border: 2.5px solid #e6e6e6;
  box-shadow: 0 2px 9px #0001;
  cursor: pointer;
  text-align: center;
  transition: .18s border, .16s box-shadow;
  position: relative;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.style-tile.selected {
  border: 2.5px solid #389bf9;
  box-shadow: 0 0 0 4px #d6ebfd;
}
.tile-title {
  font-weight: 900;
  font-size: 23px;
  letter-spacing: .09em;
  margin: 20px 0 3px 0;
  text-align: center;
}
.tile-body {
  font-size: 17px;
  color: #444;
  margin-bottom: 22px;
}
.tile-footer {
  position: absolute;
  bottom: 8px;
  left: 16px;
  font-size: 14px;
  font-weight: 600;
  opacity: 0.91;
  letter-spacing: .02em;
}
#num-slides { margin:23px 0 22px 0; font-size: 16px; width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #aaa;}
button { background: linear-gradient(90deg,#262328,#8bc1e8); border: none; color: white; font-weight: 700; font-size: 18px; padding: 14px; width: 100%; border-radius: 12px; cursor: pointer; transition: all 0.3s;}
button:disabled { background: #a1b0ff; cursor: not-allowed;}
#loading {margin-top: 20px;text-align: center;font-size: 16px;color: #4c48d0;display: none;}
#download-btn { margin-top: 20px; display: none; width: 100%; font-weight: 700; font-size: 16px; padding: 12px; background: #38d44c; color: white; border: none; border-radius: 9px; cursor: pointer; text-align: center; text-decoration: none; display: block;}
</style>
</head>
<body>
  <div class="container">
    <h1>Fast Presentation Generator</h1>
    <form id="presentation-form">
      <div>
        <label for="num-slides">Number of Slides</label>
        <select id="num-slides" name="num_slides" required>
          <option value="1">1 slide</option>
          <option value="2">2 slides</option>
          <option value="3">3 slides</option>
          <option value="4" selected>4 slides</option>
          <option value="5">5 slides</option>
          <option value="6">6 slides</option>
          <option value="7">7 slides</option>
          <option value="8">8 slides</option>
          <option value="9">9 slides</option>
          <option value="10">10 slides</option>
          <option value="11">11 slides</option>
          <option value="12">12 slides</option>
          <option value="13">13 slides</option>
          <option value="14">14 slides</option>
          <option value="15">15 slides</option>
          <option value="20">20 slides</option>
        </select>
      </div>
      <div style="margin-bottom:16px;">
        <label style="font-weight:bold;font-size:17px;margin-bottom:10px;display:block;">Choose Your Template Style</label>
        <div id="template-style-grid">
          <div class="style-tile selected" data-value="1" style="background:#eef6ff;">
            <span class="tile-footer">Breeze</span>
            <div class="tile-title" style="color:#173770;">Title</div>
            <div class="tile-body">Body &amp; <span style="text-decoration:underline;color:#477ec9;cursor:pointer;">link</span></div>
          </div>
          <div class="style-tile" data-value="2" style="background:#211a18;">
            <span class="tile-footer" style="color:#eac89f;">Canaveral</span>
            <div class="tile-title" style="color:#eac89f;">Title</div>
            <div class="tile-body" style="color:#ccc;">Body &amp; <span style="text-decoration:underline;color:#e06a59;cursor:pointer;">link</span></div>
          </div>
          <div class="style-tile" data-value="3" style="background:#050626;">
            <span class="tile-footer" style="color:#dbe3fe;">Night Sky</span>
            <div class="tile-title" style="color:#dbe3fe;">Title</div>
            <div class="tile-body" style="color:#ccc;">Body &amp; <span style="text-decoration:underline;color:#9cd2ff;cursor:pointer;">link</span></div>
          </div>
          <div class="style-tile" data-value="4" style="background:#fbf7f1;">
            <span class="tile-footer">Dune</span>
            <div class="tile-title" style="color:#826b54;">Title</div>
            <div class="tile-body">Body &amp; <span style="text-decoration:underline;color:#b3a58d;cursor:pointer;">link</span></div>
          </div>
          <div class="style-tile" data-value="5" style="background:#f8f8fb;">
            <span class="tile-footer">Serene</span>
            <div class="tile-title" style="color:#5c5287;">Title</div>
            <div class="tile-body">Body &amp; <span style="text-decoration:underline;color:#6c5edd;cursor:pointer;">link</span></div>
          </div>
          <div class="style-tile" data-value="6" style="background:#18191c;">
            <span class="tile-footer" style="color:#ededed;">Bonan Hale</span>
            <div class="tile-title" style="color:#ededed;">Title</div>
            <div class="tile-body" style="color:#ccc;">Body &amp; <span style="text-decoration:underline;color:#dadb5d;cursor:pointer;">link</span></div>
          </div>
        </div>
        <input type="hidden" name="template_number" id="template_number" value="1" />
      </div>
      <div>
        <label for="topic">Presentation Topic</label>
        <input type="text" id="topic" name="topic" required placeholder="Enter presentation topic" />
      </div>
      <label for="voice">Voice</label>
      <input type="text" id="voice" name="voice" value="Magpie-Multilingual.EN-US.Sofia" required />
      <label for="delay_between_slides">Delay Between Slides (seconds)</label>
      <input type="number" id="delay_between_slides" name="delay_between_slides" min="0" step="0.1" value="1" required />
      <label for="remove_watermarks">Remove Watermarks</label>
      <select name="remove_watermarks" id="remove_watermarks">
        <option value="true" selected>True</option>
        <option value="false">False</option>
      </select>
      <button type="submit" id="generate-btn">Generate Presentation</button>
      <div id="loading">Generating presentation... Please wait up to 20 seconds.</div>
    </form>
    <a href="#" id="download-btn" download style="display:none;">Download PowerPoint Presentation</a>
  </div>
  <script src="main.js"></script>
</body>
</html>
